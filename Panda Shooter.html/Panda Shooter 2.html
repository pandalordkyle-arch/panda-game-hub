<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panda Arena – Ultimate Wave Shooter</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:Arial;
}
canvas{
    background:#1a1a1a;
    display:block;
}
.panel{
    position:fixed;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:8px;
}
#hud{top:10px;left:10px;}
#waveUI{top:10px;right:10px;}

/* TAB SYSTEM */
#tabs{
    position:fixed;
    bottom:10px;
    left:10px;
    background:rgba(0,0,0,0.8);
    padding:10px;
    border-radius:10px;
    width:260px;
}
.tab-buttons{display:flex;gap:5px;margin-bottom:8px;}
.tab-btn{flex:1;padding:6px;background:#222;border-radius:6px;cursor:pointer;text-align:center;}
.tab-btn:hover{background:#444;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.shop-item{
    background:#222;
    padding:8px;
    border-radius:6px;
    margin-bottom:6px;
    cursor:pointer;
}
.shop-item:hover{background:#444;}

#leaderboardList{max-height:200px;overflow-y:auto;}
.leader-item{background:#222;padding:6px;border-radius:6px;margin-bottom:4px;}

#menu{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
}
.btn{padding:15px 30px;background:#222;border-radius:8px;cursor:pointer;}
.btn:hover{background:#444;}
</style>
</head>
<body>

<div id="menu">
<h1>Panda Arena – Ultimate Shooter</h1>
<div class="btn" onclick="startGame()">Start Arena</div>
</div>

<div id="hud" class="panel" style="display:none;">
Health: <span id="health">100</span><br>
Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span>
</div>

<div id="waveUI" class="panel" style="display:none;">
Wave: <span id="wave">1</span><br>
Enemies Left: <span id="enemiesLeft">0</span>
</div>

<!-- TAB PANEL -->
<div id="tabs" style="display:none;">
<div class="tab-buttons">
<div class="tab-btn" onclick="openTab('shopTab')">Shop</div>
<div class="tab-btn" onclick="openTab('invTab')">Inventory</div>
<div class="tab-btn" onclick="openTab('leaderTab')">Leaderboard</div>
</div>

<div id="shopTab" class="tab-content active">
<div class="shop-item" onclick="buy('autoFire')">Auto-Firer (50)</div>
<div class="shop-item" onclick="buy('health')">+50 Health (30)</div>
<div class="shop-item" onclick="buy('damage')">+Damage (40)</div>
<div class="shop-item" onclick="buy('speed')">+Speed (60)</div>
</div>

<div id="invTab" class="tab-content">
<h3>Inventory</h3>
<div id="inventoryList"></div>
</div>

<div id="leaderTab" class="tab-content">
<h3>Top Players</h3>
<div id="leaderboardList"></div>
</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

window.addEventListener("resize", () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
});

let mouse = { x: canvas.width/2, y: canvas.height/2 };
canvas.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

const WORLD_SIZE = 3000;

let player = {
    x: 1500,
    y: 1500,
    size: 20,
    speed: 5,
    health: 100,
    damage: 10,
    autoFire: false,
    inventory: []
};

let zombies = [];
let drops = [];
let bullets = [];
let damageTexts = [];
let hitMarkers = [];
let wave = 1;
let score = 0;
let coins = 0;
let gameRunning = false;
let camera = {x:0,y:0};

/* SOUND EFFECTS */
const sounds = {
    shoot: new Audio("https://cdn.freesound.org/previews/240/240776_4100879-lq.mp3"),
    hit: new Audio("https://cdn.freesound.org/previews/177/177222_2740497-lq.mp3"),
    coin: new Audio("https://cdn.freesound.org/previews/348/348165_5121236-lq.mp3")
};

/* START */
function startGame(){
    document.getElementById("menu").style.display="none";
    document.getElementById("hud").style.display="block";
    document.getElementById("waveUI").style.display="block";
    document.getElementById("tabs").style.display="block";
    gameRunning = true;
    startWave();
    gameLoop();
}

/* TAB SYSTEM */
function openTab(id){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    if(id==="leaderTab") loadLeaderboard();
    if(id==="invTab") renderInventory();
}

/* LEADERBOARD (SERVER READY) */
async function submitScore(){
    try{
        await fetch("https://your-server.com/api/score",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({score})
        });
    }catch(e){}
}

async function loadLeaderboard(){
    const list=document.getElementById("leaderboardList");
    list.innerHTML="Loading...";
    try{
        let res=await fetch("https://your-server.com/api/leaderboard");
        let data=await res.json();
        list.innerHTML="";
        data.forEach((item,i)=>{
            let div=document.createElement("div");
            div.className="leader-item";
            div.textContent=`#${i+1} ${item.name} – ${item.score}`;
            list.appendChild(div);
        });
    }catch(e){
        list.innerHTML="Leaderboard unavailable.";
    }
}

/* INVENTORY */
function renderInventory(){
    const list=document.getElementById("inventoryList");
    list.innerHTML="";
    player.inventory.forEach(it=>{
        let div=document.createElement("div");
        div.textContent="• "+it;
        list.appendChild(div);
    });
}

/* SHOP */
function buy(item){
    if(item==="autoFire" && coins>=50){
        coins-=50;
        player.autoFire=true;
        player.inventory.push("Auto-Firer");
        alert("Auto-Firer Enabled!");
    }
    if(item==="health" && coins>=30){
        coins-=30;
        player.health+=50;
        sounds.coin.play();
    }
    if(item==="damage" && coins>=40){
        coins-=40;
        player.damage+=5;
        player.inventory.push("Damage+");
        sounds.coin.play();
    }
    if(item==="speed" && coins>=60){
        coins-=60;
        player.speed+=1;
        player.inventory.push("Speed+");
    }
}

/* ENEMY AI VARIANTS */
function createEnemy(){
    let type = Math.random();
    let speed, health, color;

    if(type < 0.5){
        speed = 1 + wave*0.2;
        health = 20 + wave*5;
        color = "lime"; // normal
    }else if(type < 0.8){
        speed = 2 + wave*0.3;
        health = 10 + wave*2;
        color = "cyan"; // fast
    }else{
        speed = 0.8;
        health = 50 + wave*10;
        color = "orange"; // tank
    }

    let angle=Math.random()*Math.PI*2;
    let radius=1000+Math.random()*500;

    zombies.push({
        x: player.x + Math.cos(angle)*radius,
        y: player.y + Math.sin(angle)*radius,
        size: 20,
        speed,
        health,
        color,
        ranged: Math.random()<0.2 // ranged attacker
    });
}

function startWave(){
    zombies=[];
    let count = 5 + wave*3;
    for(let i=0;i<count;i++) createEnemy();
}

/* DROPS */
function spawnDrop(x,y){
    let types=["coin","health","damage"];
    let type=types[Math.floor(Math.random()*types.length)];
    drops.push({x,y,type});
}

/* HIT / DAMAGE */
function showDamage(x,y,amount){
    damageTexts.push({x,y,amount,life:60});
}
function showHit(x,y){
    hitMarkers.push({x,y,life:20});
}

/* INPUT */
let keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

/* SHOOT */
function shoot(){
    let dx = mouse.x + camera.x - player.x;
    let dy = mouse.y + camera.y - player.y;
    let dist = Math.sqrt(dx*dx + dy*dy) || 1;

    bullets.push({
        x: player.x,
        y: player.y,
        dx: dx/dist * 12,
        dy: dy/dist * 12,
        size: 5,
        trail: []
    });
    sounds.shoot.play();
}

/* AUTO FIRE */
setInterval(()=>{
    if(gameRunning && player.autoFire) shoot();
},300);

/* UPDATE */
function update(){

    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;
    if(keys["a"]) player.x-=player.speed;
    if(keys["d"]) player.x+=player.speed;

    camera.x+=(player.x-innerWidth/2-camera.x)*0.1;
    camera.y+=(player.y-innerHeight/2-camera.y)*0.1;

    /* bullets */
    bullets.forEach((b,bi)=>{
        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>8) b.trail.shift();
        b.x+=b.dx;
        b.y+=b.dy;
    });

    /* zombies */
    zombies.forEach((z,zi)=>{
        let dx=player.x-z.x;
        let dy=player.y-z.y;
        let dist=Math.sqrt(dx*dx+dy*dy);

        if(dist>0){
            z.x+=(dx/dist)*z.speed;
            z.y+=(dy/dist)*z.speed;
        }

        if(dist<25) player.health-=0.5;

        bullets.forEach((b,bi)=>{
            let dx2=z.x-b.x;
            let dy2=z.y-b.y;
            if(Math.sqrt(dx2*dx2+dy2*dy2)<z.size){
                z.health -= player.damage;
                showDamage(z.x,z.y,player.damage);
                showHit(b.x,b.y);
                sounds.hit.play();
                bullets.splice(bi,1);
            }
        });

        if(z.health<=0){
            score+=10;
            coins+=5;
            spawnDrop(z.x,z.y);
            zombies.splice(zi,1);
        }
    });

    damageTexts.forEach((t,i)=>{t.life--; if(t.life<=0) damageTexts.splice(i,1);});
    hitMarkers.forEach((h,i)=>{h.life--; if(h.life<=0) hitMarkers.splice(i,1);});

    drops.forEach((d,i)=>{
        let dx=player.x-d.x;
        let dy=player.y-d.y;
        if(Math.sqrt(dx*dx+dy*dy)<30){
            if(d.type==="coin"){coins+=5; sounds.coin.play();}
            if(d.type==="health") player.health+=20;
            if(d.type==="damage") player.damage+=2;
            drops.splice(i,1);
        }
    });

    if(zombies.length===0) wave++, startWave();

    if(player.health<=0){
        submitScore();
        alert("Arena Over! Score: "+score);
        location.reload();
    }
}

/* MINI MAP */
function drawMinimap(){
    const size = 120;
    const x = canvas.width - size - 10;
    const y = 10;

    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(x,y,size,size);

    let scale = size / WORLD_SIZE;

    ctx.fillStyle="white";
    ctx.fillRect(x + player.x*scale -2, y + player.y*scale -2,4,4);

    zombies.forEach(z=>{
        ctx.fillStyle="lime";
        ctx.fillRect(x + z.x*scale, y + z.y*scale,3,3);
    });
}

/* HEALTH BARS */
function drawHealthBars(){
    zombies.forEach(z=>{
        ctx.fillStyle="red";
        ctx.fillRect(z.x, z.y - 10, 20, 4);
        ctx.fillStyle="lime";
        ctx.fillRect(z.x, z.y - 10, (z.health/100)*20, 4);
    });
}

/* DRAW */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(-camera.x,-camera.y);

    ctx.fillStyle="#222";
    ctx.fillRect(0,0,WORLD_SIZE,WORLD_SIZE);

    drops.forEach(d=>{
        ctx.fillStyle = d.type==="coin"?"yellow": d.type==="health"?"red":"blue";
        ctx.beginPath();
        ctx.arc(d.x,d.y,8,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();

    bullets.forEach(b=>{
        ctx.strokeStyle="orange";
        ctx.beginPath();
        for(let i=0;i<b.trail.length;i++){
            let p=b.trail[i];
            if(i===0) ctx.moveTo(p.x,p.y);
            else ctx.lineTo(p.x,p.y);
        }
        ctx.stroke();

        ctx.fillStyle="orange";
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    zombies.forEach(z=>{
        ctx.fillStyle=z.color;
        ctx.fillRect(z.x,z.y,z.size,z.size);
    });

    damageTexts.forEach(t=>{
        ctx.fillStyle="white";
        ctx.fillText("-"+t.amount, t.x, t.y - (60-t.life));
    });

    hitMarkers.forEach(h=>{
        ctx.strokeStyle="red";
        ctx.beginPath();
        ctx.arc(h.x,h.y,6,0,Math.PI*2);
        ctx.stroke();
    });

    drawHealthBars();
    ctx.restore();

    drawMinimap();
}

/* LOOP */
function gameLoop(){
    if(!gameRunning) return;
    update();
    draw();

    document.getElementById("health").textContent=Math.floor(player.health);
    document.getElementById("score").textContent=score;
    document.getElementById("coins").textContent=coins;
    document.getElementById("wave").textContent=wave;
    document.getElementById("enemiesLeft").textContent=zombies.length;

    requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
