<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panda Arena – Wave Shooter</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    color:white;
    font-family:Arial;
}
canvas{
    background:#1a1a1a;
    display:block;
}
.panel{
    position:fixed;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:8px;
}
#hud{top:10px;left:10px;}
#waveUI{top:10px;right:10px;}
#menu{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
}
.btn{
    padding:15px 30px;
    background:#222;
    border-radius:8px;
    cursor:pointer;
}
.btn:hover{background:#444;}
</style>
</head>
<body>

<div id="menu">
<h1>Panda Arena – Wave Shooter</h1>
<div class="btn" onclick="startGame()">Start Arena</div>
</div>

<div id="hud" class="panel" style="display:none;">
Health: <span id="health">100</span><br>
Score: <span id="score">0</span>
</div>

<div id="waveUI" class="panel" style="display:none;">
Wave: <span id="wave">1</span><br>
Enemies Left: <span id="enemiesLeft">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

const WORLD_SIZE=3000;

let player={
x:1500,
y:1500,
size:20,
speed:5,
health:100
};

let zombies=[];
let bullets=[];
let wave=1;
let enemiesToSpawn=5;
let score=0;
let gameRunning=false;
let camera={x:0,y:0};

/* START */
function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("waveUI").style.display="block";
gameRunning=true;
startWave();
gameLoop();
}

/* WAVE SYSTEM */
function startWave(){
enemiesToSpawn=5+wave*3;
spawnEnemies(enemiesToSpawn);
}

function spawnEnemies(count){
for(let i=0;i<count;i++){
let angle=Math.random()*Math.PI*2;
let radius=1000+Math.random()*500;
zombies.push({
x:player.x+Math.cos(angle)*radius,
y:player.y+Math.sin(angle)*radius,
size:20,
speed:1+wave*0.2,
health:20+wave*5
});
}
}

function nextWave(){
wave++;
startWave();
}

/* INPUT */
let keys={};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

/* SHOOT */
canvas.addEventListener("click",e=>{
let rect=canvas.getBoundingClientRect();
let mouseX=e.clientX-rect.left+camera.x;
let mouseY=e.clientY-rect.top+camera.y;

let dx=mouseX-player.x;
let dy=mouseY-player.y;
let dist=Math.sqrt(dx*dx+dy*dy);

bullets.push({
x:player.x,
y:player.y,
dx:dx/dist*10,
dy:dy/dist*10,
size:5
});
});

/* UPDATE */
function update(){

if(keys["w"]) player.y-=player.speed;
if(keys["s"]) player.y+=player.speed;
if(keys["a"]) player.x-=player.speed;
if(keys["d"]) player.x+=player.speed;

camera.x+=(player.x-canvas.width/2-camera.x)*0.1;
camera.y+=(player.y-canvas.height/2-camera.y)*0.1;

/* bullets */
bullets.forEach(b=>{
b.x+=b.dx;
b.y+=b.dy;
});

/* zombies */
zombies.forEach((z,zIndex)=>{
let dx=player.x-z.x;
let dy=player.y-z.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist>0){
z.x+=(dx/dist)*z.speed;
z.y+=(dy/dist)*z.speed;
}

if(dist<25) player.health-=0.5;

/* bullet hit */
bullets.forEach((b,bIndex)=>{
let dx2=z.x-b.x;
let dy2=z.y-b.y;
if(Math.sqrt(dx2*dx2+dy2*dy2)<z.size){
z.health-=10;
bullets.splice(bIndex,1);
}
});

if(z.health<=0){
score+=10;
zombies.splice(zIndex,1);
}
});

/* wave clear */
if(zombies.length===0){
nextWave();
}

if(player.health<=0){
alert("Arena Over! Score: "+score);
location.reload();
}
}

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.save();
ctx.translate(-camera.x,-camera.y);

/* arena floor */
ctx.fillStyle="#222";
ctx.fillRect(0,0,WORLD_SIZE,WORLD_SIZE);

/* player */
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

/* bullets */
ctx.fillStyle="yellow";
bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
ctx.fill();
});

/* zombies */
ctx.fillStyle="lime";
zombies.forEach(z=>{
ctx.fillRect(z.x,z.y,z.size,z.size);
});

ctx.restore();
}

/* LOOP */
function gameLoop(){
if(!gameRunning) return;
update();
draw();
document.getElementById("health").textContent=Math.floor(player.health);
document.getElementById("score").textContent=score;
document.getElementById("wave").textContent=wave;
document.getElementById("enemiesLeft").textContent=zombies.length;
requestAnimationFrame(gameLoop);
}
</script>
</body>
</html>
