<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OMNIVERSE DODGE - Dodge Enemies & Survive</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

header {
    padding: 20px;
    background: #111;
    box-shadow: 0 0 20px #0ff;
}

canvas {
    background: #000;
    border: 2px solid #0ff;
}

#hud {
    margin-top: 10px;
}

#health {
    color: lime;
}

#gameContainer {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h1>🔥 OMNIVERSE DODGE 🔥</h1>
<p>Dodge enemies. Survive. Dominate.</p>
</header>

<div id="hud">
Health: <span id="health">100</span>
</div>

<div id="gameContainer">
<canvas id="gameCanvas" width="800" height="500"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: 20,
    speed: 5,
    health: 100
};

let enemies = [];
let keys = {};

// input
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// spawn enemies
function spawnEnemy() {
    let side = Math.floor(Math.random() * 4);
    let x, y;

    if (side === 0) { x = Math.random() * canvas.width; y = -20; }
    if (side === 1) { x = Math.random() * canvas.width; y = canvas.height + 20; }
    if (side === 2) { x = -20; y = Math.random() * canvas.height; }
    if (side === 3) { x = canvas.width + 20; y = Math.random() * canvas.height; }

    enemies.push({ x, y, size: 15, speed: 1 + Math.random() * 1.5 });
}

setInterval(spawnEnemy, 1500);

// update
function update() {
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;

    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

    // move enemies toward player
    enemies.forEach(enemy => {
        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        enemy.x += (dx / dist) * enemy.speed;
        enemy.y += (dy / dist) * enemy.speed;

        // collision
        if (dist < player.size + enemy.size) {
            player.health -= 1;
            document.getElementById("health").textContent = player.health;

            if (player.health <= 0) {
                alert("You died!");
                location.reload();
            }
        }
    });
}

// draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // player
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#0ff";
    ctx.fillStyle = "#0ff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();

    // enemies
    ctx.shadowBlur = 10;
    ctx.shadowColor = "red";
    ctx.fillStyle = "red";

    enemies.forEach(enemy => {
        ctx.beginPath();
        ctx.arc(enemy.x, enemy.y, enemy.size, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.shadowBlur = 0;
}

// loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
