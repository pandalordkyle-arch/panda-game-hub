<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panda Clash 3D Ultimate</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; }
#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 10px;
}
#commands {
  position: absolute;
  right: 10px;
  top: 10px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
}
button { margin: 4px; }
</style>
</head>
<body>

<div id="hud">
  <div>Gold: <span id="gold">0</span></div>
  <div>Squad: <span id="squadCount">0</span></div>
</div>

<div id="commands">
  <button onclick="command('attack')">Attack</button>
  <button onclick="command('defend')">Defend</button>
  <button onclick="command('patrol')">Patrol</button>
  <button onclick="formation('line')">Line</button>
  <button onclick="formation('circle')">Circle</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let terrain, squad = [];
let enemies = [];
let gold = 200;
let commandMode = "defend";
let formationMode = "line";

init();
animate();

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
  camera.position.set(0, 20, 40);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ground
  const groundGeo = new THREE.PlaneGeometry(200, 200);
  const groundMat = new THREE.MeshBasicMaterial({ color: 0x2a7b2a, side: THREE.DoubleSide });
  terrain = new THREE.Mesh(groundGeo, groundMat);
  terrain.rotation.x = -Math.PI / 2;
  scene.add(terrain);

  spawnEnemies();
  spawnSquad();

  window.addEventListener("resize", onResize);
}

function spawnSquad() {
  for (let i = 0; i < 4; i++) {
    const geo = new THREE.BoxGeometry(2, 2, 2);
    const mat = new THREE.MeshBasicMaterial({ color: 0x8b4513 });
    const panda = new THREE.Mesh(geo, mat);

    panda.position.set(i * 3, 1, 10);
    panda.userData = { level: 1, xp: 0, state: "defend" };

    scene.add(panda);
    squad.push(panda);
  }

  updateHUD();
}

function spawnEnemies() {
  for (let i = 0; i < 6; i++) {
    const geo = new THREE.SphereGeometry(1.5);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
    const enemy = new THREE.Mesh(geo, mat);

    enemy.position.set(Math.random() * 50 - 25, 1, Math.random() * -50);
    enemy.userData = { health: 50 };

    scene.add(enemy);
    enemies.push(enemy);
  }
}

function command(mode) {
  commandMode = mode;
  squad.forEach(p => p.userData.state = mode);
}

function formation(type) {
  formationMode = type;

  if (type === "line") {
    squad.forEach((p, i) => {
      p.position.x = i * 3 - 4;
      p.position.z = 10;
    });
  }

  if (type === "circle") {
    const radius = 6;
    squad.forEach((p, i) => {
      const angle = (i / squad.length) * Math.PI * 2;
      p.position.x = Math.cos(angle) * radius;
      p.position.z = Math.sin(angle) * radius + 10;
    });
  }
}

function aiPathfind(panda, target) {
  const dx = target.position.x - panda.position.x;
  const dz = target.position.z - panda.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz);

  if (dist > 1) {
    panda.position.x += dx * 0.01;
    panda.position.z += dz * 0.01;
  }
}

function pandaAI(panda) {
  let target = null;

  if (commandMode === "attack") {
    target = enemies.find(e => e.userData.health > 0);
  }

  if (commandMode === "defend") {
    target = terrain;
  }

  if (commandMode === "patrol") {
    panda.position.x += Math.sin(Date.now() * 0.001) * 0.01;
    panda.position.z += Math.cos(Date.now() * 0.001) * 0.01;
  }

  if (target && target.position) {
    aiPathfind(panda, target);
  }

  enemies.forEach(enemy => {
    const dist = panda.position.distanceTo(enemy.position);
    if (dist < 3 && enemy.userData.health > 0) {
      enemy.userData.health -= 1;
      if (enemy.userData.health <= 0) {
        scene.remove(enemy);
        gold += 20;
        updateHUD();
        pandaGainXP(panda);
      }
    }
  });
}

function pandaGainXP(panda) {
  panda.userData.xp = (panda.userData.xp || 0) + 10;
  if (panda.userData.xp >= 100) {
    panda.userData.level++;
    panda.userData.xp = 0;
    alert("Panda leveled up!");
  }
}

function updateHUD() {
  document.getElementById("gold").textContent = gold;
  document.getElementById("squadCount").textContent = squad.length;
}

function animate() {
  requestAnimationFrame(animate);

  squad.forEach(p => pandaAI(p));

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
