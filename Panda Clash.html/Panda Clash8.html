<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panda Clash – Complete Edition</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }

#menu {
position:absolute; width:100vw; height:100vh;
background:#111; color:white; text-align:center;
padding-top:120px;
}

button { padding:8px 12px; margin:4px; }

#hud {
position:absolute; top:10px; left:10px;
background:rgba(0,0,0,0.6);
color:white; padding:10px;
}

#shop {
position:absolute; right:10px; top:10px;
background:rgba(0,0,0,0.6);
color:white; padding:10px;
}

#minimap {
position:absolute;
bottom:10px; right:10px;
width:200px; height:200px;
background:#111;
border:2px solid white;
}
</style>
</head>
<body>

<div id="menu">
<h1>PANDA CLASH – COMPLETE EDITION</h1>
<button onclick="startGame()">START WAR</button>
</div>

<div id="hud" style="display:none;">
Day: <span id="day">1</span><br>
Gold: <span id="gold">500</span><br>
Base HP:
<div style="width:200px;background:#333;">
<div id="baseBar" style="height:6px;background:red;width:100%;"></div>
</div>
</div>

<div id="shop" style="display:none;">
<b>Shop / Skills</b><br>
<button onclick="buyPanda()">Buy Panda (120)</button>
<button onclick="buildMine()">Gold Mine (250)</button>
<button onclick="upgrade('damage')">+Damage (300)</button>
<button onclick="upgrade('fireRate')">+FireRate (300)</button>
<button onclick="upgrade('armor')">+Armor (300)</button>
<button onclick="upgrade('speed')">+Speed (300)</button>
<button onclick="upgrade('income')">+Mine Income (300)</button>
</div>

<canvas id="minimap"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene,camera,renderer;
let squad=[], enemies=[], bullets=[], mines=[];
let gold=500, day=1;
let skills={damage:1,fireRate:1,armor:1,speed:1,income:1};
let base, baseHP=1500;
let gameOver=false;

function startGame(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("shop").style.display="block";
init();
animate();
}

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,3000);
camera.position.set(0,70,110);
camera.lookAt(0,0,0);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(100,200,100);
sun.castShadow=true;
scene.add(sun);

scene.add(new THREE.AmbientLight(0x404040));

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(800,800),
new THREE.MeshStandardMaterial({color:0x2e8b57})
);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

base=new THREE.Mesh(
new THREE.BoxGeometry(20,20,20),
new THREE.MeshStandardMaterial({color:0x4444ff})
);
base.position.y=10;
base.castShadow=true;
scene.add(base);

nextDay();
}

function nextDay(){
document.getElementById("day").innerText=day;

scene.background=new THREE.Color(day%2==0?0x000022:0x87ceeb);

let count=15+day*5;
for(let i=0;i<count;i++) spawnEnemy();

if(day%5==0) spawnBoss();
}

function spawnEnemy(){
let enemy=new THREE.Group();

let body=new THREE.Mesh(
new THREE.CylinderGeometry(4,4,10,8),
new THREE.MeshStandardMaterial({color:0xaa0000})
);
body.position.y=8;
body.castShadow=true;
enemy.add(body);

enemy.position.set(Math.random()*500-250,0,Math.random()*-500);
enemy.userData={health:250+day*40,speed:0.12+day*0.003};
scene.add(enemy);
enemies.push(enemy);
}

function spawnBoss(){
let boss=new THREE.Mesh(
new THREE.DodecahedronGeometry(15),
new THREE.MeshStandardMaterial({color:0xff00ff})
);
boss.position.set(Math.random()*400-200,20,Math.random()*-400);
boss.castShadow=true;
boss.userData={health:3000+day*200,speed:0.07,boss:true};
scene.add(boss);
enemies.push(boss);
}

function buyPanda(){
if(gold<120)return;
gold-=120;

let panda=new THREE.Group();

let body=new THREE.Mesh(
new THREE.BoxGeometry(6,10,6),
new THREE.MeshStandardMaterial({color:0xffffff})
);
body.position.y=10;
body.castShadow=true;
panda.add(body);

let leg1=new THREE.Mesh(new THREE.BoxGeometry(2,6,2),
new THREE.MeshStandardMaterial({color:0xeeeeee}));
leg1.position.set(-2,3,0);
leg1.castShadow=true;
panda.add(leg1);

let leg2=leg1.clone();
leg2.position.x=2;
panda.add(leg2);

let armorColor=skills.armor>=3?0xffd700:
skills.armor>=2?0x00ffff:0x4a6aff;

let armor=new THREE.Mesh(
new THREE.BoxGeometry(7,5,7),
new THREE.MeshStandardMaterial({color:armorColor})
);
armor.position.y=11;
armor.castShadow=true;
panda.add(armor);

let gun=new THREE.Mesh(
new THREE.BoxGeometry(8,1,1),
new THREE.MeshStandardMaterial({color:0x222222})
);
gun.position.set(6,12,0);
gun.castShadow=true;
panda.add(gun);

panda.position.set(Math.random()*40-20,0,Math.random()*40-20);

panda.userData={
cool:0,
speed:0.25*skills.speed,
leg1,leg2,gun
};

scene.add(panda);
squad.push(panda);
}

function buildMine(){
if(gold<250)return;
gold-=250;

let mine=new THREE.Mesh(
new THREE.CylinderGeometry(8,8,6,8),
new THREE.MeshStandardMaterial({color:0xffd700})
);
mine.position.set(Math.random()*80-40,3,Math.random()*80-40);
mine.castShadow=true;
scene.add(mine);
mines.push(mine);
}

function upgrade(type){
if(gold<300)return;
gold-=300;
skills[type]++;
}

function shoot(from,target){
let b=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xffff00})
);
b.position.copy(from.position);
b.userData={target};
scene.add(b);
bullets.push(b);
}

function pandaAI(p){
if(enemies.length===0)return;

let nearest=enemies[0];
let min=p.position.distanceTo(nearest.position);

enemies.forEach(e=>{
let d=p.position.distanceTo(e.position);
if(d<min){min=d; nearest=e;}
});

p.userData.leg1.rotation.x=Math.sin(Date.now()*0.01)*0.8;
p.userData.leg2.rotation.x=-Math.sin(Date.now()*0.01)*0.8;

if(min>80){
let dir=new THREE.Vector3().subVectors(nearest.position,p.position).normalize();
p.position.add(dir.multiplyScalar(p.userData.speed));
p.lookAt(nearest.position);
}
else{
if(p.userData.cool<=0){
p.userData.gun.position.x=5;
shoot(p,nearest);
createFlash(p);
p.userData.cool=40/skills.fireRate;
}
}

if(p.userData.cool>0){
p.userData.cool--;
p.userData.gun.position.x=6;
}
}

function enemyAI(e){
let dist=e.position.distanceTo(base.position);
if(dist>20){
let dir=new THREE.Vector3().subVectors(base.position,e.position).normalize();
e.position.add(dir.multiplyScalar(e.userData.speed));
}
else{
baseHP-=2;
}
}

function bulletAI(b){
if(!b.userData.target.parent){scene.remove(b);return;}

let dir=new THREE.Vector3().subVectors(b.userData.target.position,b.position).normalize();
b.position.add(dir.multiplyScalar(3));

if(b.position.distanceTo(b.userData.target.position)<10){
b.userData.target.userData.health-=80*skills.damage;
createExplosion(b.position);
if(b.userData.target.userData.health<=0){
gold+=b.userData.target.userData.boss?400:80;
scene.remove(b.userData.target);
enemies=enemies.filter(e=>e.parent);
}
scene.remove(b);
}
}

function createFlash(p){
let f=new THREE.Mesh(
new THREE.SphereGeometry(3),
new THREE.MeshBasicMaterial({color:0xffffaa})
);
f.position.copy(p.position);
f.position.x+=10;
f.position.y+=12;
scene.add(f);
setTimeout(()=>scene.remove(f),100);
}

function createExplosion(pos){
for(let i=0;i<15;i++){
let part=new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshBasicMaterial({color:0xff6600})
);
part.position.copy(pos);
scene.add(part);
setTimeout(()=>scene.remove(part),300);
}
}

function income(){
gold+=mines.length*(1*skills.income);
}

function updateMini(){
let c=document.getElementById("minimap");
let ctx=c.getContext("2d");
ctx.fillStyle="#111";
ctx.fillRect(0,0,200,200);

ctx.fillStyle="blue";
ctx.fillRect(100,100,6,6);

ctx.fillStyle="red";
enemies.forEach(e=>{
let x=100+(e.position.x/800)*200;
let y=100+(e.position.z/800)*200;
ctx.fillRect(x,y,3,3);
});
}

function animate(){
if(gameOver)return;
requestAnimationFrame(animate);

squad.forEach(p=>pandaAI(p));
enemies.forEach(e=>enemyAI(e));
bullets.forEach(b=>bulletAI(b));

if(enemies.length===0){
day++;
nextDay();
}

if(baseHP<=0){
alert("GAME OVER");
gameOver=true;
}

income();
updateMini();

document.getElementById("gold").innerText=gold;
document.getElementById("baseBar").style.width=(baseHP/15)+"%";

renderer.render(scene,camera);
}
</script>
</body>
</html>
