<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panda Clash - FINAL WAR</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:black; }
#menu {
  position:absolute; width:100vw; height:100vh;
  background:#111; color:white; text-align:center; padding-top:120px;
}
button { padding:8px 14px; margin:4px; }
#hud {
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,0.6); color:white; padding:10px;
}
#shop {
  position:absolute; right:10px; top:10px;
  background:rgba(0,0,0,0.6); color:white; padding:10px;
}
#minimap {
  position:absolute; bottom:10px; right:10px;
  width:200px; height:200px;
  background:#222; border:2px solid white;
}
.bar {
  height:5px; background:red;
}
</style>
</head>
<body>

<div id="menu">
  <h1>PANDA CLASH - FINAL WAR</h1>
  <button onclick="startGame()">START WAR</button>
</div>

<div id="hud" style="display:none;">
  Day: <span id="day">1</span><br>
  Gold: <span id="gold">500</span><br>
  Base HP:
  <div style="width:200px;background:#333;">
    <div id="baseHP" class="bar" style="width:100%;"></div>
  </div>
</div>

<div id="shop" style="display:none;">
  <b>Shop / Skills</b><br>
  <button onclick="buyPanda()">Buy Panda (100)</button>
  <button onclick="buildMine()">Gold Mine (200)</button>
  <button onclick="upgrade('damage')">+Damage (250)</button>
  <button onclick="upgrade('fireRate')">+FireRate (250)</button>
  <button onclick="upgrade('armor')">+Armor (250)</button>
</div>

<canvas id="minimap"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene,camera,renderer;
let squad=[], enemies=[], bullets=[], mines=[];
let gold=500, day=1;
let skills={damage:1, fireRate:1, armor:1};
let base, baseHealth=1000;
let gameOver=false;

function startGame(){
  document.getElementById("menu").style.display="none";
  document.getElementById("hud").style.display="block";
  document.getElementById("shop").style.display="block";
  init();
  animate();
}

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,3000);
  camera.position.set(0,60,90);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.background=new THREE.Color(0x87ceeb);

  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(600,600),
    new THREE.MeshBasicMaterial({color:0x2e8b57,side:THREE.DoubleSide})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // MAIN BASE
  base=new THREE.Mesh(
    new THREE.BoxGeometry(12,12,12),
    new THREE.MeshBasicMaterial({color:0x4444ff})
  );
  base.position.set(0,6,0);
  scene.add(base);

  nextDay();
}

function nextDay(){
  document.getElementById("day").innerText=day;
  let count=10+day*4;

  for(let i=0;i<count;i++) spawnEnemy();
}

function spawnEnemy(){
  const e=new THREE.Mesh(
    new THREE.SphereGeometry(3),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  e.position.set(Math.random()*400-200,5,Math.random()*-400);
  e.userData={health:150+day*30, speed:0.1+day*0.005};
  scene.add(e);
  enemies.push(e);
}

function buyPanda(){
  if(gold<100)return;
  gold-=100;

  const p=new THREE.Mesh(
    new THREE.BoxGeometry(4,6,4),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  p.position.set(Math.random()*20-10,3,Math.random()*20-10);
  p.userData={cool:0};
  scene.add(p);
  squad.push(p);
}

function buildMine(){
  if(gold<200)return;
  gold-=200;

  const m=new THREE.Mesh(
    new THREE.CylinderGeometry(5,5,4,8),
    new THREE.MeshBasicMaterial({color:0xffd700})
  );
  m.position.set(Math.random()*40-20,2,Math.random()*40-20);
  scene.add(m);
  mines.push(m);
}

function upgrade(type){
  if(gold<250)return;
  gold-=250;
  skills[type]++;
}

function shoot(from,target){
  const b=new THREE.Mesh(
    new THREE.SphereGeometry(1),
    new THREE.MeshBasicMaterial({color:0xffff00})
  );
  b.position.copy(from.position);
  b.userData={target};
  scene.add(b);
  bullets.push(b);
}

function pandaAI(p){
  if(enemies.length===0)return;
  let target=enemies[0];
  let min=p.position.distanceTo(target.position);

  enemies.forEach(e=>{
    let d=p.position.distanceTo(e.position);
    if(d<min){min=d; target=e;}
  });

  if(min<50 && p.userData.cool<=0){
    shoot(p,target);
    p.userData.cool=50/skills.fireRate;
  }

  if(p.userData.cool>0)p.userData.cool--;
}

function enemyAI(e){
  let dist=e.position.distanceTo(base.position);
  if(dist>10){
    let dir=new THREE.Vector3().subVectors(base.position,e.position).normalize();
    e.position.add(dir.multiplyScalar(e.userData.speed));
  } else {
    baseHealth-=1;
  }
}

function bulletAI(b){
  if(!b.userData.target.parent){ scene.remove(b); return; }

  let dir=new THREE.Vector3().subVectors(b.userData.target.position,b.position).normalize();
  b.position.add(dir.multiplyScalar(2));

  if(b.position.distanceTo(b.userData.target.position)<4){
    b.userData.target.userData.health-=40*skills.damage;

    createExplosion(b.position);

    if(b.userData.target.userData.health<=0){
      gold+=50;
      scene.remove(b.userData.target);
      enemies=enemies.filter(e=>e.parent);
    }
    scene.remove(b);
  }
}

function createExplosion(pos){
  for(let i=0;i<10;i++){
    const p=new THREE.Mesh(
      new THREE.SphereGeometry(1),
      new THREE.MeshBasicMaterial({color:0xffaa00})
    );
    p.position.copy(pos);
    scene.add(p);
    setTimeout(()=>scene.remove(p),300);
  }
}

function income(){
  gold+=mines.length*2;
}

function updateMinimap(){
  const canvas=document.getElementById("minimap");
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,200,200);

  ctx.fillStyle="blue";
  ctx.fillRect(100,100,6,6);

  ctx.fillStyle="red";
  enemies.forEach(e=>{
    let x=100+(e.position.x/600)*200;
    let y=100+(e.position.z/600)*200;
    ctx.fillRect(x,y,3,3);
  });
}

function animate(){
  if(gameOver)return;

  requestAnimationFrame(animate);

  squad.forEach(p=>pandaAI(p));
  enemies.forEach(e=>enemyAI(e));
  bullets.forEach(b=>bulletAI(b));

  if(enemies.length===0){
    day++;
    nextDay();
  }

  if(baseHealth<=0){
    alert("GAME OVER");
    gameOver=true;
  }

  income();
  updateMinimap();

  document.getElementById("gold").innerText=gold;
  document.getElementById("baseHP").style.width=(baseHealth/10)+"%";

  renderer.render(scene,camera);
}
</script>

</body>
</html>
