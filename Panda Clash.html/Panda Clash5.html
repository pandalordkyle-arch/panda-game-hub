<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panda Clash Evolution</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#launcher {
  position:absolute;
  width:100vw; height:100vh;
  background:#111;
  color:white;
  text-align:center;
  padding-top:120px;
}
button { padding:10px 18px; margin:5px; }
#hud {
  position:absolute;
  top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:10px;
}
#ui {
  position:absolute;
  right:10px; top:10px;
  background:rgba(0,0,0,0.6);
  color:white;
  padding:10px;
}
</style>
</head>
<body>

<div id="launcher">
  <h1>Panda Clash EVOLUTION</h1>
  <button onclick="startGame()">Start War</button>
</div>

<div id="hud" style="display:none;">
  Day: <span id="day">1</span><br>
  Gold: <span id="gold">200</span><br>
  Pandas: <span id="pandas">0</span>
</div>

<div id="ui" style="display:none;">
  <button onclick="buyPanda()">Buy Panda (50)</button>
  <div id="inventory"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let squad=[], enemies=[];
let gold=200;
let day=1;
let spawnTimer=0;

function startGame(){
  document.getElementById("launcher").style.display="none";
  document.getElementById("hud").style.display="block";
  document.getElementById("ui").style.display="block";
  init();
  animate();
}

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,1000);
  camera.position.set(0,30,50);
  camera.lookAt(0,0,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(300,300),
    new THREE.MeshBasicMaterial({color:0x228b22,side:THREE.DoubleSide})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  nextDay();
}

function nextDay(){
  document.getElementById("day").innerText=day;

  let normalCount=5+day*2;
  let bossCount=Math.floor(day/3);

  for(let i=0;i<normalCount;i++) spawnEnemy(false);
  for(let i=0;i<bossCount;i++) spawnEnemy(true);
}

function spawnEnemy(isBoss){
  let geo, mat;

  if(isBoss){
    geo=new THREE.BoxGeometry(6,6,6);
    mat=new THREE.MeshBasicMaterial({color:0x9900ff});
  }else{
    geo=new THREE.SphereGeometry(2);
    mat=new THREE.MeshBasicMaterial({color:0xff0000});
  }

  const e=new THREE.Mesh(geo,mat);
  e.position.set(Math.random()*100-50,3,Math.random()*-100);
  e.userData={
    health:isBoss?300+day*50:80+day*10,
    speed:isBoss?0.05:0.08,
    attack:isBoss?6:2,
    boss:isBoss
  };

  scene.add(e);
  enemies.push(e);
}

function buyPanda(){
  if(gold<50)return alert("Not enough gold!");
  gold-=50;

  const p=new THREE.Mesh(
    new THREE.BoxGeometry(2,3,2),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  p.position.set(Math.random()*10-5,1.5,Math.random()*10-5);
  p.userData={speed:0.12,attack:3};

  scene.add(p);
  squad.push(p);
  updateUI();
}

function pandaAI(p){
  let nearest=null;
  let minDist=9999;

  enemies.forEach(e=>{
    if(e.userData.health>0){
      let d=p.position.distanceTo(e.position);
      if(d<minDist){
        minDist=d;
        nearest=e;
      }
    }
  });

  if(nearest){
    if(minDist>3){
      let dir=new THREE.Vector3().subVectors(nearest.position,p.position).normalize();
      p.position.add(dir.multiplyScalar(p.userData.speed));
    }else{
      nearest.userData.health-=p.userData.attack;
      if(nearest.userData.health<=0){
        scene.remove(nearest);
        gold+=nearest.userData.boss?200:20;
      }
    }
  }
}

function enemyAI(e){
  if(squad.length===0)return;

  let target=squad[Math.floor(Math.random()*squad.length)];
  let dist=e.position.distanceTo(target.position);

  if(dist>3){
    let dir=new THREE.Vector3().subVectors(target.position,e.position).normalize();
    e.position.add(dir.multiplyScalar(e.userData.speed));
  }else{
    scene.remove(target);
    squad.splice(squad.indexOf(target),1);
  }
}

function updateUI(){
  document.getElementById("gold").innerText=gold;
  document.getElementById("pandas").innerText=squad.length;
}

function animate(){
  requestAnimationFrame(animate);

  squad.forEach(p=>pandaAI(p));
  enemies.forEach(e=>enemyAI(e));

  enemies=enemies.filter(e=>e.parent);

  if(enemies.length===0){
    day++;
    nextDay();
  }

  updateUI();
  renderer.render(scene,camera);
}
</script>

</body>
</html>
