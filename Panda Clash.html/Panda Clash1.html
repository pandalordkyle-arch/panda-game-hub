<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panda Clash Ultimate+</title>
<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
}

#menu {
  text-align: center;
  padding-top: 80px;
}

#menu button {
  padding: 15px 30px;
  font-size: 20px;
}

#game {
  display: none;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  padding-right: 20px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(10, 60px);
  grid-template-rows: repeat(10, 60px);
  gap: 2px;
  margin: 80px auto;
  width: fit-content;
}

.tile {
  width: 60px;
  height: 60px;
  background: #2b2b2b;
  border: 1px solid #444;
  transition: transform 0.2s;
}

.tile.animate {
  transform: scale(1.1);
}

.building { background: #3a7bd5; }
.enemy { background: #d53a3a; }
.mine { background: #3ad55a; }
.wall { background: #888; }
.npc { background: #d5a03a; }

#actions {
  text-align: center;
  margin-top: 20px;
}

#shop, #inventory, #clan, #chatBox, #tradeBox {
  display: none;
  position: fixed;
  top: 20%;
  left: 35%;
  background: #222;
  padding: 20px;
  border: 2px solid #555;
}
</style>
</head>
<body>

<div id="menu">
  <h1>Panda Clash Ultimate+</h1>
  <button onclick="startGame()">Play</button>
  <div>Top Score: <span id="topScore">0</span></div>
</div>

<div id="game">
  <div id="hud">
    <div>Health: <span id="health">100</span></div>
    <div>Gold: <span id="gold">0</span></div>
    <div>Clan: <span id="clanName">None</span></div>
  </div>

  <div id="grid"></div>

  <div id="actions">
    <button onclick="build('townhall')">Townhall (200)</button>
    <button onclick="build('barracks')">Barracks (150)</button>
    <button onclick="build('wall')">Wall (50)</button>
    <button onclick="openShop()">Shop</button>
    <button onclick="openInventory()">Inventory</button>
    <button onclick="openClan()">Clan</button>
    <button onclick="saveCloud()">Cloud Save</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop">
  <h3>Shop</h3>
  <button onclick="buy('sword')">Sword (100)</button>
  <button onclick="buy('armor')">Armor (150)</button>
  <button onclick="buy('mine')">Mining Tool (200)</button>
  <button onclick="closeShop()">Close</button>
</div>

<!-- INVENTORY -->
<div id="inventory">
  <h3>Inventory</h3>
  <div id="inventoryList"></div>
  <button onclick="closeInventory()">Close</button>
</div>

<!-- CLAN -->
<div id="clan">
  <h3>Clan</h3>
  <input id="clanInput" placeholder="Clan name">
  <button onclick="joinClan()">Join/Create</button>
  <button onclick="leaveClan()">Leave</button>
  <button onclick="closeClan()">Close</button>
</div>

<!-- CHAT WITH NPC -->
<div id="chatBox">
  <h3>NPC Chat</h3>
  <div id="chatLog" style="height:120px; overflow:auto;"></div>
  <input id="chatInput" placeholder="Say something">
  <button onclick="sendChat()">Send</button>
  <button onclick="closeChat()">Close</button>
</div>

<!-- TRADE -->
<div id="tradeBox">
  <h3>Trade</h3>
  <div id="tradeOptions"></div>
  <button onclick="closeTrade()">Close</button>
</div>

<script>
let gold = 200;
let health = 100;
let inventory = [];
let clan = localStorage.getItem("clan") || "";
let topScore = localStorage.getItem("topScore") || 0;

document.getElementById("topScore").textContent = topScore;
document.getElementById("clanName").textContent = clan || "None";

let grid = document.getElementById("grid");
let tiles = [];
let enemies = [];
let npcs = [];

function startGame() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";

  grid.innerHTML = "";
  tiles = [];

  for (let i = 0; i < 100; i++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.onclick = () => buildOnTile(tile);
    grid.appendChild(tile);
    tiles.push({ el: tile, type: "empty", health: 100 });
  }

  spawnEnemyBases();
  generateMines();
  spawnAIEnemies();
  spawnNPCs();
  updateHUD();
}

function updateHUD() {
  document.getElementById("gold").textContent = gold;
  document.getElementById("health").textContent = health;
}

let buildMode = null;
function build(type) {
  alert("Click a tile to build: " + type);
  buildMode = type;
}

function buildOnTile(tile) {
  if (!buildMode) return;

  let cost = buildMode === "townhall" ? 200 :
            buildMode === "barracks" ? 150 :
            buildMode === "wall" ? 50 : 0;

  if (gold < cost) {
    alert("Not enough gold!");
    return;
  }

  gold -= cost;
  tile.classList.add(buildMode, "animate");
  setTimeout(() => tile.classList.remove("animate"), 200);
  updateHUD();
}

function spawnAIEnemies() {
  enemies = [];

  for (let i = 0; i < 8; i++) {
    const tile = tiles[Math.floor(Math.random() * tiles.length)];
    tile.el.classList.add("enemy");

    enemies.push({
      tile,
      interval: setInterval(() => enemyAI(tile), 1200)
    });
  }
}

function enemyAI(enemyTile) {
  const target = tiles.find(t => t.el.classList.contains("townhall")) || tiles[0];

  if (Math.random() < 0.4) {
    target.health -= 10;
    if (target.health <= 0) target.el.classList.remove("building");
  }

  if (Math.random() < 0.3) {
    health -= 5;
    updateHUD();
    if (health <= 0) {
      alert("You died!");
      location.reload();
    }
  }

  enemyTile.el.classList.remove("enemy");
  const next = tiles[Math.floor(Math.random() * tiles.length)];
  next.el.classList.add("enemy");
  enemyTile = next;
}

function generateMines() {
  for (let i = 0; i < 12; i++) {
    const tile = tiles[Math.floor(Math.random() * tiles.length)];
    tile.el.classList.add("mine");
    tile.type = "mine";

    tile.el.onclick = () => {
      if (tile.type === "mine") {
        gold += 25;
        inventory.push("gold ore");
        tile.el.classList.remove("mine");
        tile.type = "empty";
        updateHUD();
        showInventory();

        setTimeout(() => {
          tile.el.classList.add("mine");
          tile.type = "mine";
        }, 5000);
      }
    };
  }
}

function spawnEnemyBases() {
  for (let i = 0; i < 15; i++) {
    const tile = tiles[Math.floor(Math.random() * tiles.length)];
    tile.el.classList.add("enemy");
  }
}

function spawnNPCs() {
  for (let i = 0; i < 6; i++) {
    const tile = tiles[Math.floor(Math.random() * tiles.length)];
    tile.el.classList.add("npc");

    npcs.push({
      tile,
      name: "Villager",
      dialogue: [
        "Hello traveler!",
        "I trade goods for gold.",
        "The world is dangerous out there."
      ],
      trade: {
        sword: 100,
        armor: 150,
        potion: 50
      }
    });

    tile.el.onclick = () => openChat(npcs[npcs.indexOf(npcs.find(n => n.tile === tile))]);
  }
}

let activeNPC = null;

function openChat(npc) {
  activeNPC = npc;
  document.getElementById("chatBox").style.display = "block";
  document.getElementById("chatLog").innerHTML = `<div>${npc.dialogue[0]}</div>`;
}

function sendChat() {
  const input = document.getElementById("chatInput").value;
  if (!input) return;

  const reply = aiReply(input);
  document.getElementById("chatLog").innerHTML += `<div>You: ${input}</div>`;
  document.getElementById("chatLog").innerHTML += `<div>NPC: ${reply}</div>`;
  document.getElementById("chatInput").value = "";
}

function aiReply(text) {
  text = text.toLowerCase();

  if (text.includes("trade")) {
    openTrade();
    return "Sure! Here are my items.";
  }

  if (text.includes("hello") || text.includes("hi")) {
    return "Hello friend!";
  }

  return "I don't understand.";
}

function closeChat() {
  document.getElementById("chatBox").style.display = "none";
}

function openTrade() {
  const box = document.getElementById("tradeBox");
  const options = document.getElementById("tradeOptions");

  options.innerHTML = "";

  if (!activeNPC) return;

  for (let item in activeNPC.trade) {
    const cost = activeNPC.trade[item];
    options.innerHTML += `
      <div>${item} - ${cost} gold 
        <button onclick="tradeBuy('${item}', ${cost})">Buy</button>
      </div>`;
  }

  box.style.display = "block";
}

function tradeBuy(item, cost) {
  if (gold < cost) {
    alert("Not enough gold!");
    return;
  }

  gold -= cost;
  inventory.push(item);
  updateHUD();
  showInventory();
}

function closeTrade() {
  document.getElementById("tradeBox").style.display = "none";
}

function openInventory() {
  document.getElementById("inventory").style.display = "block";
  showInventory();
}

function closeInventory() {
  document.getElementById("inventory").style.display = "none";
}

function showInventory() {
  const list = document.getElementById("inventoryList");
  list.innerHTML = inventory.map(i => `<div>${i}</div>`).join("");
}

function openShop() { document.getElementById("shop").style.display = "block"; }
function closeShop() { document.getElementById("shop").style.display = "none"; }

function buy(item) {
  if (item === "sword" && gold >= 100) {
    gold -= 100;
    inventory.push("sword");
  } else if (item === "armor" && gold >= 150) {
    gold -= 150;
    health += 50;
  } else if (item === "mine" && gold >= 200) {
    gold -= 200;
    inventory.push("mining tool");
  } else {
    alert("Not enough gold");
  }
  updateHUD();
  closeShop();
  showInventory();
}

function openClan() { document.getElementById("clan").style.display = "block"; }
function closeClan() { document.getElementById("clan").style.display = "none"; }

function joinClan() {
  const name = document.getElementById("clanInput").value;
  if (!name) return;
  clan = name;
  localStorage.setItem("clan", clan);
  document.getElementById("clanName").textContent = clan;
  closeClan();
}

function leaveClan() {
  clan = "";
  localStorage.removeItem("clan");
  document.getElementById("clanName").textContent = "None";
}

function saveCloud() {
  const data = { gold, health, inventory, clan };
  localStorage.setItem("cloudSave", JSON.stringify(data));
  alert("Cloud saved (local)");
}

function loadCloud() {
  const data = JSON.parse(localStorage.getItem("cloudSave") || "{}");
  if (data.gold !== undefined) gold = data.gold;
  if (data.health !== undefined) health = data.health;
  if (data.inventory) inventory = data.inventory;
  if (data.clan) clan = data.clan;
  updateHUD();
  document.getElementById("clanName").textContent = clan || "None";
}

window.onload = loadCloud;
</script>

</body>
</html>
