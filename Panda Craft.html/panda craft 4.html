<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandaCraft - Minecraft Style</title>
<style>
body{
margin:0;
overflow:hidden;
font-family: 'Arial';
background:black;
}

/* MINECRAFT GUI OVERLAYS */
.gui{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:rgba(40,25,15,0.95);
border:4px solid #8b5a2b;
padding:20px;
border-radius:8px;
display:none;
color:white;
text-align:center;
min-width:300px;
}

/* START MENU */
#startMenu{
display:block;
}

.gui h1{
margin-top:0;
font-size:28px;
}

/* MINECRAFT BUTTON */
.mc-button{
background:#8b5a2b;
border:2px solid #3a2412;
color:white;
padding:10px 20px;
margin:6px;
cursor:pointer;
font-size:16px;
}
.mc-button:hover{
background:#a06b35;
}

/* CROSSHAIR */
#crosshair{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:22px;
pointer-events:none;
}

/* STATS */
#stats{
position:absolute;
bottom:10px;
left:10px;
color:white;
}

/* HOTBAR */
#hotbar{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:4px;
}
.hot{
width:50px;height:50px;
background:rgba(0,0,0,0.7);
border:2px solid #555;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* PAUSE MENU */
#pauseMenu{
background:rgba(40,25,15,0.95);
border:4px solid #8b5a2b;
}

/* INVENTORY */
#inventory{
background:rgba(40,25,15,0.95);
border:4px solid #8b5a2b;
}

/* CRAFT */
#craft{
background:rgba(40,25,15,0.95);
border:4px solid #8b5a2b;
}

.slot{
width:50px;height:50px;
background:rgba(255,255,255,0.15);
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}
.count{
position:absolute;
bottom:2px;right:4px;
font-size:12px;
}

</style>
</head>
<body>

<!-- START MENU -->
<div id="startMenu" class="gui">
<h1>PandaCraft</h1>
<button class="mc-button" onclick="startGame()">Play</button>
</div>

<!-- PAUSE MENU -->
<div id="pauseMenu" class="gui">
<h1>Paused</h1>
<button class="mc-button" onclick="resumeGame()">Resume</button>
</div>

<!-- INVENTORY -->
<div id="inventory" class="gui">
<h2>Inventory</h2>
<div id="invSlots" style="display:grid;grid-template-columns:repeat(13,55px);gap:6px;"></div>
</div>

<!-- CRAFT -->
<div id="craft" class="gui">
<h2>Crafting</h2>
<div id="craftSlots" style="display:grid;grid-template-columns:repeat(3,55px);gap:6px;"></div>
<button class="mc-button" onclick="craft()">Craft</button>
</div>

<div id="crosshair">+</div>

<div id="stats">
❤️ <span id="hp">20</span>
&nbsp; 🍗 <span id="hunger">20</span>
&nbsp; 🛡 <span id="armor">0</span>
</div>

<div id="hotbar"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
<script>

// =======================
// GAME STATE
// =======================
let gameRunning = false;

// GUI helpers
function show(id){document.getElementById(id).style.display="block";}
function hide(id){document.getElementById(id).style.display="none";}

// Start / Resume
function startGame(){
hide("startMenu");
gameRunning=true;
document.body.requestPointerLock();
}

function resumeGame(){
hide("pauseMenu");
gameRunning=true;
document.body.requestPointerLock();
}

// ESC Pause
document.addEventListener("keydown",e=>{
if(e.key==="Escape"){
if(gameRunning){
gameRunning=false;
show("pauseMenu");
document.exitPointerLock();
}
}
if(e.key==="e"){
toggleInventory();
}
if(e.key==="c"){
toggleCraft();
}
});

// Inventory / Craft toggles
function toggleInventory(){
const inv=document.getElementById("inventory");
inv.style.display = inv.style.display==="block"?"none":"block";
}

function toggleCraft(){
const c=document.getElementById("craft");
c.style.display = c.style.display==="block"?"none":"block";
craftGridUI();
}

// =======================
// THREE SETUP
// =======================
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.4));
const sun=new THREE.DirectionalLight(0xffffff,1);
scene.add(sun);

// =======================
// MATERIALS
// =======================
const materials={
grass:new THREE.MeshLambertMaterial({color:0x44cc44}),
dirt:new THREE.MeshLambertMaterial({color:0x8b5a2b}),
stone:new THREE.MeshLambertMaterial({color:0x777777}),
wood:new THREE.MeshLambertMaterial({color:0x8b5a2b}),
door:new THREE.MeshLambertMaterial({color:0x553322}),
wheat:new THREE.MeshLambertMaterial({color:0x55aa55}),
seed:new THREE.MeshLambertMaterial({color:0x33aa33}),
iron_armor:new THREE.MeshLambertMaterial({color:0xb0b0b0})
};

const blocks=[];
const CHUNK=16;

// HEIGHT
function getHeight(x,z){
return Math.floor(Math.sin(x*0.2)*Math.cos(z*0.2)*3+6);
}

// BLOCK
function createBlock(x,y,z,type){
const geo=new THREE.BoxGeometry(1,1,1);
const mesh=new THREE.Mesh(geo,materials[type]||materials.dirt);
mesh.position.set(x+0.5,y+0.5,z+0.5);
mesh.userData={x,y,z,type,growth:0};
scene.add(mesh);
blocks.push(mesh);
return mesh;
}

// SIMPLE WORLD
for(let x=-20;x<20;x++){
for(let z=-20;z<20;z++){
const h=getHeight(x,z);
for(let y=0;y<h;y++){
let t="stone";
if(y>h-4)t="dirt";
if(y===h-1)t="grass";
createBlock(x,y,z,t);
}
}
}

// =======================
// PLAYER
// =======================
camera.position.set(0,15,10);
let yaw=0,pitch=0;
let velocityY=0,onGround=false;
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// LOOK
document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body && gameRunning){
yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;
pitch=Math.max(-1.5,Math.min(1.5,pitch));
camera.rotation.set(pitch,yaw,0,"YXZ");
}
});

// MOVE
function update(){
if(!gameRunning)return;

const f=new THREE.Vector3();
camera.getWorldDirection(f);
f.y=0;f.normalize();
const r=new THREE.Vector3();
r.crossVectors(f,new THREE.Vector3(0,1,0)).normalize();

if(keys["w"])camera.position.addScaledVector(f,0.15);
if(keys["s"])camera.position.addScaledVector(f,-0.15);
if(keys["a"])camera.position.addScaledVector(r,-0.15);
if(keys["d"])camera.position.addScaledVector(r,0.15);

velocityY-=0.02;
camera.position.y+=velocityY;
const ground=getHeight(Math.floor(camera.position.x),Math.floor(camera.position.z))+1.7;
if(camera.position.y<=ground){
camera.position.y=ground;
velocityY=0;
onGround=true;
}
if(keys[" "]&&onGround){
velocityY=0.35;
onGround=false;
}
}

// =======================
// LOOP
// =======================
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
