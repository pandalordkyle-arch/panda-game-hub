<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panda Flappy Bird</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#70c5ce;
}

canvas{
display:block;
margin:auto;
background:linear-gradient(#70c5ce,#b3e5fc);
}

#ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
font-weight:bold;
}

#score{
font-size:40px;
}

#high{
font-size:18px;
}

</style>
</head>

<body>

<div id="ui">
<div id="score">0</div>
<div id="high">High Score: 0</div>
</div>

<canvas id="game" width="400" height="600"></canvas>

<audio id="jump" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="scoreSound" src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"></audio>
<audio id="hit" src="https://assets.mixkit.co/active_storage/sfx/2053/2053-preview.mp3"></audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let high = localStorage.getItem("pandaFlappyHigh") || 0
document.getElementById("high").innerText = "High Score: " + high

let bgX = 0

let bird = {
x:80,
y:200,
size:30,
vel:0,
gravity:0.5,
jump:-8
}

let pipes = []
let score = 0

function spawnPipe(){

let gap = 160
let top = Math.random()*250 + 50

pipes.push({
x:canvas.width,
width:60,
top:top,
bottom:top+gap,
passed:false
})

}

setInterval(spawnPipe,1500)

function jump(){

bird.vel = bird.jump
document.getElementById("jump").play()

}

document.addEventListener("keydown",jump)
document.addEventListener("click",jump)

function drawPanda(){

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(bird.x,bird.y,bird.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(bird.x-12,bird.y-20,8,0,Math.PI*2)
ctx.arc(bird.x+12,bird.y-20,8,0,Math.PI*2)
ctx.fill()

ctx.beginPath()
ctx.arc(bird.x-10,bird.y-5,5,0,Math.PI*2)
ctx.arc(bird.x+10,bird.y-5,5,0,Math.PI*2)
ctx.fill()

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height)

bgX -= 1

ctx.fillStyle="#a5d6a7"

ctx.fillRect(bgX,500,400,100)
ctx.fillRect(bgX+400,500,400,100)

if(bgX <= -400) bgX = 0

bird.vel += bird.gravity
bird.y += bird.vel

drawPanda()

pipes.forEach(pipe=>{

pipe.x -= 2

ctx.fillStyle="#2e7d32"

ctx.fillRect(pipe.x,0,pipe.width,pipe.top)
ctx.fillRect(pipe.x,pipe.bottom,pipe.width,canvas.height)

if(
bird.x + bird.size > pipe.x &&
bird.x - bird.size < pipe.x + pipe.width &&
(bird.y - bird.size < pipe.top || bird.y + bird.size > pipe.bottom)
){

document.getElementById("hit").play()

setTimeout(()=>{
location.reload()
},300)

}

if(!pipe.passed && pipe.x < bird.x){

pipe.passed = true
score++

document.getElementById("score").innerText = score
document.getElementById("scoreSound").play()

if(score > high){
high = score
localStorage.setItem("pandaFlappyHigh",high)
document.getElementById("high").innerText = "High Score: " + high
}

}

})

if(bird.y > canvas.height || bird.y < 0){
location.reload()
}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
