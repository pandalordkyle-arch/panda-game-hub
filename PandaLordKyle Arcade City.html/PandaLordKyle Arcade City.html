```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PandaLordKyle 3D Arcade Metaverse</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HUD */

#hud{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
z-index:10;
}

#skinBtn{
margin-top:6px;
}

#gameViewer{
position:fixed;
inset:0;
background:black;
display:none;
z-index:20;
flex-direction:column;
align-items:center;
justify-content:center;
}

#gameFrame{
width:90%;
height:85%;
border:3px solid #00e1ff;
}

button{
padding:6px 12px;
border:none;
background:#00e1ff;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div id="hud">

🐼 PandaLordKyle Arcade City<br>
Click screen to start<br>
WASD move • Mouse look

<br><br>

<button id="skinBtn">Change Panda Skin</button>

</div>

<div id="gameViewer">

<button onclick="exitGame()">EXIT GAME</button>

<iframe id="gameFrame"></iframe>

</div>

<script>

/* THREE SETUP */

const scene=new THREE.Scene()
scene.background=new THREE.Color(0x0f172a)

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

/* LIGHTING */

const sun=new THREE.DirectionalLight(0xffffff,1)
sun.position.set(20,30,10)
scene.add(sun)

scene.add(new THREE.AmbientLight(0x404040))

/* FLOOR */

const groundGeo=new THREE.PlaneGeometry(500,500)
const groundMat=new THREE.MeshStandardMaterial({color:0x1e293b})

const ground=new THREE.Mesh(groundGeo,groundMat)
ground.rotation.x=-Math.PI/2
scene.add(ground)

/* PLAYER */

const pandaSkins=[
0xffffff,
0xffcc00,
0x00ffff,
0xff66aa
]

let skinIndex=0

const bodyGeo=new THREE.BoxGeometry(1.2,1.5,1)
const bodyMat=new THREE.MeshStandardMaterial({color:pandaSkins[0]})

const player=new THREE.Mesh(bodyGeo,bodyMat)
player.position.y=1

scene.add(player)

camera.position.set(0,2,5)

/* SKIN BUTTON */

document.getElementById("skinBtn").onclick=()=>{

skinIndex++

if(skinIndex>=pandaSkins.length) skinIndex=0

player.material.color.set(pandaSkins[skinIndex])

}

/* BUILDINGS */

function createBuilding(x,z,w,h,d,color){

const geo=new THREE.BoxGeometry(w,h,d)
const mat=new THREE.MeshStandardMaterial({color})

const b=new THREE.Mesh(geo,mat)

b.position.set(x,h/2,z)

scene.add(b)

}

/* CITY */

for(let i=0;i<20;i++){

let x=(Math.random()*200)-100
let z=(Math.random()*200)-100
let h=5+Math.random()*20

createBuilding(x,z,10,h,10,0x334155)

}

/* ARCADE MACHINES */

const machines=[]

function createArcade(x,z,file){

const geo=new THREE.BoxGeometry(2,3,2)
const mat=new THREE.MeshStandardMaterial({color:0x2563eb})

const machine=new THREE.Mesh(geo,mat)

machine.position.set(x,1.5,z)

scene.add(machine)

machines.push({mesh:machine,file:file})

}

createArcade(-10,-10,"Panda Shooter.html")
createArcade(-15,-10,"Arena Wave.html")
createArcade(-20,-10,"Panda Clash.html")
createArcade(-25,-10,"PandaLord Dodge World.html")

/* SHOP */

createBuilding(30,0,12,6,12,0x16a34a)

/* NPC PLAYERS */

const npcs=[]

function createNPC(x,z){

const geo=new THREE.BoxGeometry(1,1.6,1)
const mat=new THREE.MeshStandardMaterial({color:0xff4444})

const npc=new THREE.Mesh(geo,mat)

npc.position.set(x,1,z)

scene.add(npc)

npcs.push(npc)

}

for(let i=0;i<8;i++){

createNPC(
(Math.random()*60)-30,
(Math.random()*60)-30
)

}

/* NPC AI */

function updateNPC(){

npcs.forEach(npc=>{

npc.position.x+=Math.sin(Date.now()*0.001+npc.id)*0.02
npc.position.z+=Math.cos(Date.now()*0.001+npc.id)*0.02

})

}

/* POINTER LOCK */

document.body.onclick=()=>{

document.body.requestPointerLock()

}

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement===document.body){

camera.rotation.y-=e.movementX*0.002

}

})

/* MOVEMENT */

const keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

function move(){

const speed=0.2

if(keys["w"]) player.position.z-=speed
if(keys["s"]) player.position.z+=speed
if(keys["a"]) player.position.x-=speed
if(keys["d"]) player.position.x+=speed

camera.position.x=player.position.x
camera.position.z=player.position.z+5

}

/* MACHINE DETECTION */

function checkMachines(){

machines.forEach(m=>{

let dx=player.position.x-m.mesh.position.x
let dz=player.position.z-m.mesh.position.z

let dist=Math.sqrt(dx*dx+dz*dz)

if(dist<2){

launchGame(m.file)

}

})

}

/* GAME */

function launchGame(file){

document.getElementById("gameViewer").style.display="flex"
document.getElementById("gameFrame").src=file

}

function exitGame(){

document.getElementById("gameViewer").style.display="none"
document.getElementById("gameFrame").src=""

}

/* LOOP */

function animate(){

requestAnimationFrame(animate)

move()
updateNPC()
checkMachines()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
